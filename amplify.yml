version: 1
frontend:
  phases:
    preBuild:
      commands:[
         nvm install 20,
         nvm use 20,
         npm install -g pnpm,
         pnpm install
      ]
    build:
      commands:[
         pnpm run build
      ]
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:[
       node_modules/**/*
       .next/cache/**/*
    ]